spring:
  application:
    name: Student Management API
    
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:studentdb
    driverClassName: org.h2.Driver
    username: sa
    password:
    
  # JPA Configuration
  jpa:
    databasePlatform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Automatically creates and drops schema at startup/shutdown
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        
  # H2 Console (for debugging - accessible at http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
      
# Logging Configuration
logging:
  level:
    root: INFO
    com.interview.assignment: DEBUG

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /

# Actuator Configuration (for monitoring - future enhancement)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

